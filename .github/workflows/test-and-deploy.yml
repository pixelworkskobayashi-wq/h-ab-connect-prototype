name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: Playwright ブラウザをインストール
        run: npx playwright install --with-deps chromium

      - name: テスト実行（モバイル）
        run: npx playwright test --project=mobile-chrome
        continue-on-error: false

      - name: テスト実行（デスクトップ）
        run: npx playwright test --project=desktop-chrome
        continue-on-error: false

      - name: テストレポートをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: 失敗時スクリーンショットをアップロード
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 3
